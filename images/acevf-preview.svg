<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="480" height="270" fill="url(#bg)"/>
  <!-- Terminal window chrome -->
  <rect x="12" y="12" width="456" height="246" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="12" y="12" width="456" height="28" rx="10" fill="#2a2a3e"/>
  <rect x="12" y="30" width="456" height="10" fill="#2a2a3e"/>
  <!-- Traffic lights -->
  <circle cx="32" cy="26" r="5" fill="#ff5f57"/>
  <circle cx="48" cy="26" r="5" fill="#ffbd2e"/>
  <circle cx="64" cy="26" r="5" fill="#28c840"/>
  <!-- Title bar text -->
  <text x="240" y="30" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">acevf — religious — "The Story of Moses" — children</text>

  <!-- Pipeline stages -->
  <text x="28" y="60" font-family="monospace" font-size="9" fill="#4f46e5">▶ Stage 1/6: Research</text>
  <rect x="28" y="65" width="200" height="5" rx="2" fill="#2a2a3e"/>
  <rect x="28" y="65" width="200" height="5" rx="2" fill="url(#bar)"/>
  <text x="235" y="72" font-family="monospace" font-size="8" fill="#06b6d4">✓ done</text>

  <text x="28" y="88" font-family="monospace" font-size="9" fill="#4f46e5">▶ Stage 2/6: Scriptwriting</text>
  <rect x="28" y="93" width="200" height="5" rx="2" fill="#2a2a3e"/>
  <rect x="28" y="93" width="200" height="5" rx="2" fill="url(#bar)"/>
  <text x="235" y="100" font-family="monospace" font-size="8" fill="#06b6d4">✓ done</text>

  <text x="28" y="116" font-family="monospace" font-size="9" fill="#4f46e5">▶ Stage 3/6: Image Generation</text>
  <rect x="28" y="121" width="200" height="5" rx="2" fill="#2a2a3e"/>
  <rect x="28" y="121" width="140" height="5" rx="2" fill="url(#bar)"/>
  <text x="235" y="128" font-family="monospace" font-size="8" fill="#888">7/12 scenes...</text>

  <text x="28" y="144" font-family="monospace" font-size="9" fill="#666">○ Stage 4/6: Voice (ElevenLabs)</text>
  <text x="28" y="161" font-family="monospace" font-size="9" fill="#666">○ Stage 5/6: Video (Wan2.2)</text>
  <text x="28" y="178" font-family="monospace" font-size="9" fill="#666">○ Stage 6/6: Post-Production</text>

  <!-- Decorative scene cards -->
  <rect x="28" y="195" width="62" height="48" rx="6" fill="#2a2a3e" stroke="#4f46e5" stroke-width="1"/>
  <text x="59" y="216" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Scene 1</text>
  <text x="59" y="228" text-anchor="middle" font-family="monospace" font-size="7" fill="#06b6d4">✓</text>

  <rect x="98" y="195" width="62" height="48" rx="6" fill="#2a2a3e" stroke="#4f46e5" stroke-width="1"/>
  <text x="129" y="216" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Scene 2</text>
  <text x="129" y="228" text-anchor="middle" font-family="monospace" font-size="7" fill="#06b6d4">✓</text>

  <rect x="168" y="195" width="62" height="48" rx="6" fill="#2a2a3e" stroke="#4f46e5" stroke-width="1"/>
  <text x="199" y="216" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Scene 3</text>
  <text x="199" y="228" text-anchor="middle" font-family="monospace" font-size="7" fill="#4f46e5">●</text>

  <rect x="238" y="195" width="62" height="48" rx="6" fill="#2a2a3e" stroke="#333" stroke-width="1"/>
  <text x="269" y="216" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">Scene 4</text>

  <rect x="308" y="195" width="62" height="48" rx="6" fill="#2a2a3e" stroke="#333" stroke-width="1"/>
  <text x="339" y="216" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">Scene 5</text>

  <!-- Cost estimate badge -->
  <rect x="358" y="55" width="100" height="30" rx="8" fill="#1a1a2e" stroke="#f43f5e" stroke-width="1"/>
  <text x="408" y="68" text-anchor="middle" font-family="monospace" font-size="8" fill="#f43f5e">Est. Cost</text>
  <text x="408" y="80" text-anchor="middle" font-family="monospace" font-size="9" fill="#fb923c" font-weight="bold">$0.42</text>

  <!-- Labels at bottom -->
  <text x="28" y="255" font-family="monospace" font-size="8" fill="#4f46e5">Gemini</text>
  <text x="78" y="255" font-family="monospace" font-size="8" fill="#888">+</text>
  <text x="90" y="255" font-family="monospace" font-size="8" fill="#06b6d4">Wan2.2</text>
  <text x="145" y="255" font-family="monospace" font-size="8" fill="#888">+</text>
  <text x="157" y="255" font-family="monospace" font-size="8" fill="#f43f5e">ElevenLabs</text>
  <text x="245" y="255" font-family="monospace" font-size="8" fill="#888">+</text>
  <text x="257" y="255" font-family="monospace" font-size="8" fill="#28c840">MoviePy</text>
  <text x="390" y="255" font-family="monospace" font-size="8" fill="#666">→ final_video.mp4</text>
</svg>
